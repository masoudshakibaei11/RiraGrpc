syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option csharp_namespace = "Rira.Grpc";

service UserService {
  rpc Create (CreateUserRequest) returns (Result);
  rpc Get (GetUserRequest) returns (UserResponse);
  rpc Update (UpdateUserRequest) returns (Result);
  rpc Delete (DeleteUserRequest) returns (Result);
  rpc GetAll (google.protobuf.Empty) returns (UserListResponse);
}


message CreateUserRequest {
  string first_name = 1;
  string last_name = 2;
  string national_code = 3;
  google.protobuf.Timestamp birth_date = 4;
}

message UserResponse {
    int32 id = 2;
    string first_name = 3;
    string last_name = 4;
    string national_code = 5;
    string birth_date = 6;
}


message GetUserRequest 
{
  int32 id = 1;
}

message DeleteUserRequest
{
    int32 id = 1;
}

message UpdateUserRequest {
  int32 id = 1;
  string first_name = 2;
  string last_name = 3;
  string national_code = 4;
  google.protobuf.Timestamp birth_date = 5;
}



message Result {
  bool is_success = 1;
}


message UserListResponse {
	repeated UserResponse users = 2;
}

message Empty {}
